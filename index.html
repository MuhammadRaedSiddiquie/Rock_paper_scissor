<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPapperScissor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
    <div class="container1">
        <h1 class="heading">Rock Paper & Scissor</h1>
        <div class="container2">
            <h3 class="text3">USER</h3>
            <h3 class="text4">COMP</h3>
            <div id="p*" class="score">
                <h2 id="p1" class="points">0</h2>
                <h2 class="points">:</h2>
                <h2 id="p2" class="points1">0</h2>
            </div>
            <div class="image">
                <img id="1" class="image1" src="1jjj.png" alt="">
                <img id="2" class="image2" src="2jj.png" alt="">
                <img id="3" class="image3" src="3jj.png" alt="">
            </div>
            <div class="image-flip">
                <img id="-1" class="image-1" src="1jjj.png" alt="">
                <img id="C1" class="image-1" src="1jj.png" alt="">
                <img id="-2" class="image-2" src="2jj.png" alt="">
                <img id="-3" class="image-3" src="3jj.png" alt="">
            </div>
        </div>

        <div id="4" class="play">play</div>
        <div id="TA" class="again">Try Again</div>
        <div id="Re" class="reset">Reset Score</div>
        
        <div id="btn" class="buttons">
            <div id="6" class="button">rock</div>
            <div id="b2" class="button">paper</div>
            <div id="b3" class="button">scissor</div>
        </div>
        <div class="text2">
            <h1 id="h-3" class="heading3"></h1>
        </div>
        
        <div id="txt" class="text">
            <h2 id="h-2" class="heading2"></h2>
        </div>
    </div>
</div>
    <script src="index.js"></script>
</body>

</html>
